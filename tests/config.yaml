listen: "127.0.0.1:4000"

tls:
  key_path: "tests/self-signed-cert/test.key"
  cert_path: "tests/self-signed-cert/test.crt"

timeout_ms: 500

backends:
  - name: "test.home"
    backend_type: "single"
    location: "127.0.0.1:8000"
  - name: "test-lb.home"
    backend_type: "loadbalanced"
    locations:
      - "127.0.0.1:8000"
      - "127.0.0.1:8001"
